name: clinvar-link

x-image: &image
  build:
    context: ..
    dockerfile: docker/Dockerfile
    target: production
  image: clinvar-link:latest

x-data-environment: &data-environment
  CLINVAR_LINK_ENVIRONMENT: development
  CLINVAR_LINK_DATA_DIR: /app/reference/current
  CLINVAR_LINK_BUNDLE_REFERENCE_ROOT: /app/reference
  CLINVAR_LINK_BUNDLE_DOWNLOAD_DIR: /app/reference
  CLINVAR_LINK_BUNDLE_URL: latest
  CLINVAR_LINK_DEVELOPMENT_LATEST: "true"
  CLINVAR_LINK_GITHUB_REPO: berntpopp/clinvar-link
  CLINVAR_LINK_BUILD_LOCAL: "false"

services:
  clinvar-data-init:
    <<: *image
    entrypoint: ["clinvar-link-data", "bootstrap"]
    environment: *data-environment
    volumes:
      - clinvar-reference:/app/reference:rw
    restart: "no"
    networks: [clinvar-network]

  clinvar-link:
    <<: *image
    container_name: clinvar-link
    depends_on:
      clinvar-data-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${CLINVAR_LINK_HOST_PORT:-8000}:8000"
    environment:
      <<: *data-environment
      CLINVAR_LINK_MCP_TRANSPORT: unified
      CLINVAR_LINK_MCP_HOST: 0.0.0.0
      CLINVAR_LINK_MCP_PORT: 8000
      CLINVAR_LINK_MCP_PATH: /mcp
      CLINVAR_LINK_MCP_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1"]'
      CLINVAR_LINK_LOG_LEVEL: INFO
      CLINVAR_LINK_LOG_FORMAT: json
    volumes:
      - clinvar-reference:/app/reference:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks: [clinvar-network]

volumes:
  clinvar-reference:

networks:
  clinvar-network:
    driver: bridge
