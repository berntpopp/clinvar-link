name: Publish bundle (disabled — build locally)

on:
  workflow_dispatch:
    inputs:
      notice:
        description: "Disabled. Build + publish locally; see the run log."
        required: false
        default: "disabled"
        type: string

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "ClinVar SQLite bundles are built, packed, and published from the maintainer's workstation."
          echo "Building on GitHub Actions is intentionally disabled (wasteful for a multi-GB index)."
          echo
          echo "On the workstation:"
          echo "  uv run clinvar-link-data publish --build      # download source, build, pack, upload"
          echo "  # or, if the index is already built:"
          echo "  uv run clinvar-link-data publish              # pack the existing ./data DB and upload"
          echo
          echo "Requires local 'gh auth login'. The release tag is bundle-<ClinVar release date>."
