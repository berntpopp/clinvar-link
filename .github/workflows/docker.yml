name: Docker

on:
  pull_request:
    paths:
      - "docker/**"
      - "clinvar_link/**"
      - "mcp_server.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - "clinvar_link/**"
      - "mcp_server.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Render base compose
        run: docker compose -f docker/docker-compose.yml config

  build-image:
    name: Build production image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Build only — the image ships no data; the SQLite index is built at
      # runtime from the ClinVar bulk download, so CI never fetches it here.
      - name: Build
        run: docker build -f docker/Dockerfile -t clinvar-link:ci .
